# Fund look-through fallback for M4. yfinance is authoritative at runtime
# (see backend/app/lookthrough.py); this YAML fills the gap for niche funds
# yfinance can't scrape, and serves as the disaster fallback when yfinance
# breaks (roadmap risk #4 / §6).
#
# Each fund is broken down across four dimensions. Weights within a
# dimension sum to 1.0 (+/- 0.01 tolerance for rounding). Dimensions:
#   asset_class: equity | fixed_income | real_estate | commodity | crypto | cash
#   sub_class:   free-form finer category
#   sector:      equities only; omit for non-equity funds
#   region:      US | intl_developed | intl_emerging | global
#
# Values here are approximate as-of 2026-04 using each fund's public
# composition reports. Precision is not the goal -- ballpark accuracy so
# the sunburst reads right. Updating these by hand is fine while the list
# stays small (~10 funds).

