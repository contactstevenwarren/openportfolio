# Seed classifications for OpenPortfolio v0.1.
#
# Source of truth for asset_class / sub_class / sector / region per ticker.
# ~50 tickers covering the maintainer's plausible holdings; merged with user
# overrides in M3+. The `classifications` DB table stays empty in v0.1 --
# the loader reads this YAML directly.
#
# Field semantics:
#   asset_class: equity | fixed_income | real_estate | commodity | crypto | cash | private
#   sub_class:   finer category within asset_class (free-form)
#   sector:      for equities; omit for non-equity
#   region:      US | intl_developed | intl_emerging | global; omit where N/A
#
# Synthetic tickers used by the /manual form (REALESTATE:*, GOLD:*, CRYPTO:*,
# PRIVATE:*, HSA_CASH:*) are resolved by prefix in app/classifications.py,
# not listed here.

