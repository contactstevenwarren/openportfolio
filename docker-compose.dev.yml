services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./data:/app/data
      - backend_venv:/venv
      - frontend_node_modules:/app/frontend/node_modules
      - frontend_next_cache:/app/frontend/.next

volumes:
  backend_venv:
  frontend_node_modules:
  frontend_next_cache:
